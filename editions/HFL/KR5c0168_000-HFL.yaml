body:
  text: 太上老君金書内序老君爲道之宗體於自然在乎三清之前象帝之先爲玉皇帝居玉清金闕下界幽㝠之中生空洞空洞之中生太無太無變化生玄元始三炁三炁變化經無數億劫化生玉容神姿玄妙玉女九君時三炁混沌未有所分元君上昇太清金闕老君遂游乎太易之先居乎太極之端分判兩儀遂生三才三才旣備化生萬有老君乃應號治世無名君治髙上虚皇治太上治上三皇師中三皇師下二皇師五帝師從開闢至虞舜間世爲師不絕經二百七十五萬八千四百餘年老君命宛委山之神玄夷使者授禹玉書禹發金簡銀編得治水之術老君上昇玉清金闕治水後其文藏于林屋洞舜後道德下衰下界一千年運㑹聖人合出是時老君出爲世師示其誕育遂託於元君玉身瓊府元君在太清金闕晝寢夢日精大如流星飛入口中嚥覺有娠下界八十一年殷武丁工年庚辰二月十五日元君與玉童玉女各三十六人降於有亳之地以有自然結煙雲之宫千門萬户復有天丁力士侍衞是時元君從左腋降誕老君是時九龍薦水以沐聖躬其龍出處化成九井是時日童散彩月妃捧華聖君尋即能言却行九步皆生九色蓮花廼指李樹此爲我姓也復曰三界之内宗余一人服自然天衣忽長九尺玉容金身口丹齒玉耳髙於頂日角月玄萬相端備不可勝言也異其相咸曰聖人厚其生天地之先不老居天地之後不少生而髮白故號曰老子降誕其時諸神仙虚皇上帝朝禮空中稱十號一曰玉皇二曰元聖三曰元始天尊四曰無上尊五曰道君六曰無名君七曰髙上虚皇君八曰太上九曰老君十曰帝師言畢稽首禮老君而辭其諸天神仙駕天仗排雲蔽空以迎聖母歸太清天縁降誕老君之日每至日焚香散花聖母歸天時在世間作天香空洞之音學仙之士因而相受爲歩虚之音本即天聲也聖母昇天時遺下一隻履天人塟之爲陵因號聖母昇天陵老君於亳亦以修行有錬丹井帝辛昏雪上帝思有麟迹老君於金闕正座上帝朝拜曰帝辛昏雪蒼生無主惟西伯姬昌有道伏願太上以慈衞之老君允上帝之請降於岐山之陽爲隱士西伯姬徵爲守藏室史授帝王之道與呂尚周武王克商元年舉爲柱下史昭王二十有五年癸丑過函谷關將適西戎初康王大夫尹喜善星曆退爲關令結草爲樓瞻星候炁忽見東方有紫炁狀如龍蛇而西度喜勑關吏曰聖人將過如有古人狀微行車駕青牛勿放過吏曰諾遂掃路焚香侍之後果然吏留之咨喜見拜首稽首曰臣先占紫炁之兆今觀道君狀貌豈非上古大神人者乎老君曰子能知吾吾能知子喜曰敢問道君姓名老君曰吾姓名渺渺從劫到劫非可悉說吾今姓李名耳字伯陽外字老聃喜館之精誠拜首稽首敢請誨言老君欲授道使喜心至忽飛行空中爲丈八黄金之身喜乃精異拜首稽首曰道君大聖大神變化不測臣血誕腥穢幸㑹天顔臣以惶以喜敢請誨言老君曰汝敬聽我命授汝道德經克享昇天爲仙師者師喜曰臣雖齋心巳久沉迹浮世實以宿慶獲奉聖恩再拜稽首受經復曰欽若玄㫖求惟進修尅以终天罔敢失墜依盟齋誦退官成眞後詣老君命喜爲無上眞人二十八天天主初老君示喜黄金身後却復九天眞形與喜別西適流沙八十一國至于天竺作浮圖之術以化胡人其國皆號老君爲有古先生至四十四年壬申二月八日釋氏踰城於我受道其經每受一句則身參太極上帝遥禮誦之萬遍白日昇天夫誦經當須清靜之處心神精一存想元聖九玄七祖皆得生天其文祕在三清金闕及諸山仙洞並金書玉簡仙童仙女焚香侍衞下界至大劫交運天地歸盡洞天之君收其文送太清金闕穆王五年甲申老君復還中國授王浡游仙駕空之術宣王二十八年辛丑三川震動王問老君是何祥也老君曰郊聞漢父歌曰太白入昴國將衰幽王年岐山崩老君曰昔伊洛竭而夏亡河竭而商亡岐山崩川竭國將亡老君授王三天隱文王不崇天文老君收文而去王爲犬戎所殺桓王三年甲子東駕白鹿與二十四仙人鬼谷子爲馭西登崑崙重過函谷時無上眞人二十八天主知老君重過關遂下天朝拜隨駕至王母館而辭老君令喜爲三十二天天主襄王十有七年乙酉老君還中國王師之爲太史更名澹然敬王年孔子適周問禮於老君老君曰子之所言其人骨皆巳朽矣獨其言在耳吾聞良賈深藏若虚君子盛德容貌若愚去子之驕氣與淫志是皆無益子之身吾是以告子若是孔子去謂弟子曰鳥吾知其能飛可以爲繒獸吾知其能走可以爲網魚吾知其能游可以爲綸至於龍吾不能知其乗風雲而上天吾今日見老子其猶龍耶吾猶醯雞焉孔子返魯稱老子爲萬方聖人不言而自信不治而自化可爲聖耶孔子卒後一百一十九年老君見秦獻公曰始秦與周合合五百年而離離十年而覇王者岀焉時謂之周太史老君從武丁時生或出或隱經九百年在世然後登山上昇紫微其山在盩厔縣界因號老子昇天陵焉玄師曰余曾遍覽道記求其指歸然好仙士有妄爲撰集爲勘其史冊多年代不同究其玄跡則首尾汗漫言空尚異反䘮其眞事旣非輕全並不録余當外考典據上符玉書言其不刋之久題曰老子金書内序永貽眞録以革浮言矣太上老君金書内序终
